# nginx.conf — Inception 42
# TLS-only, proxy FastCGI a WordPress

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        # Solo HTTPS — regla de Inception 42
        listen 443 ssl;
        listen [::]:443 ssl;

        # Dominio: ismherna.42.fr
        # La variable se sustituye en el entrypoint con envsubst
        server_name ${DOMAIN_NAME};

        # ── TLS ───────────────────────────────────────────────
        # Certificado self-signed generado en el entrypoint
        ssl_certificate     /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Solo TLSv1.2 y TLSv1.3 (requisito del subject)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Raíz de WordPress ─────────────────────────────────
        root /var/www/html;
        index index.php index.html;

        # ── Localización principal ────────────────────────────
        location / {
            # Intenta servir el fichero estático; si no existe,
            # redirige a index.php (rewrite de WordPress)
            try_files $uri $uri/ /index.php?$args;
        }

        # ── Proxy FastCGI para PHP ────────────────────────────
        location ~ \.php$ {
            # Conexión al contenedor wordpress por nombre Docker DNS
            # wordpress = nombre del servicio en docker-compose
            fastcgi_pass wordpress:9000;

            # Parámetros estándar de FastCGI
            fastcgi_index index.php;
            include fastcgi_params;

            # SCRIPT_FILENAME = ruta real del fichero PHP dentro del contenedor WP
            # Ambos contenedores comparten el volumen wp_data en /var/www/html
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # ── Bloquear acceso a ficheros sensibles ──────────────
        location ~ /\.ht {
            deny all;
        }
    }
}
