# nginx.conf — configuración personalizada para nivel 3
# Sirve HTML estático en puerto 80

# El proceso master de nginx corre como root,
# los workers como www-data (más seguro)
user www-data;

# worker_processes auto = un worker por CPU del host
worker_processes auto;

# Logs de errores (nivel warn = solo warnings y errores)
error_log /var/log/nginx/error.log warn;

# PID del proceso master
pid /var/run/nginx.pid;

events {
    # Conexiones simultáneas máximas por worker
    worker_connections 1024;
}

http {
    # Tipos MIME: asocia extensiones con Content-Type
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de los logs de acceso
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    # sendfile: usa syscall del kernel para servir ficheros (más rápido)
    sendfile        on;

    # Tiempo máximo de conexión keep-alive
    keepalive_timeout  65;

    # Definición del servidor virtual
    server {
        # Escucha en el puerto 80 para IPv4
        listen       80;
        server_name  localhost;

        # Raíz de documentos
        root /var/www/html;

        # Fichero por defecto
        index index.html;

        location / {
            # try_files: busca el fichero, si no existe → 404
            try_files $uri $uri/ =404;
        }

        # Página de error personalizada
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
