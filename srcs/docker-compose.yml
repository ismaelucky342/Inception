# srcs/docker-compose.yml

version: '3.8'

# ── Secrets ──────────────────────────────────────────────
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

services:

  # ── 1. MariaDB ──────────────────────────────────────────
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    restart: on-failure
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    expose:
      - "3306"

  # ── 2. WordPress + PHP-FPM ──────────────────────────────
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    restart: on-failure
    env_file: .env
    depends_on:
      - mariadb
    secrets:
      - db_password
      - credentials
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    expose:
      - "9000"

  # ── 3. NGINX ────────────────────────────────────────────
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    restart: on-failure
    env_file: .env
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    ports:
      - "443:443"

# ── Volúmenes nombrados ──────────────────────────────────
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ismherna/data/mysql

  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ismherna/data/wordpress

# ── Red interna ──────────────────────────────────────────
networks:
  inception:
    driver: bridge